name: Android CI

on:
  push:
    branches:
      - main
      - dev
      - master
    tags:
      - '*'
  pull_request:

jobs:
  verify:
    name: Diagnostic verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test, build diagnostic APK, and lint
        run: ./gradlew --console=plain -PSKIP_GO_BUILD=true testDiagnosticUnitTest assembleDiagnostic lintDiagnostic

      - name: Upload diagnostic APKs
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-apks
          path: app/build/outputs/apk/diagnostic/*.apk

  release:
    name: Signed release APKs
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      SPLITS_INCLUDE: "TRUE"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache: false

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release APKs
        run: ./gradlew --console=plain testDiagnosticUnitTest lintDiagnostic assembleRelease

      - name: Upload release APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release APKs
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          body: |
            SurfSave open-source release build.

            See CHANGELOG.md for release notes and verification guidance.
          draft: false
          make_latest: false
          tag_name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
